---
name: 🦝 Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      pull-requests: write
      statuses: write
    with:
      super-linter-variables: '{"VALIDATE_PYTHON_RUFF_FORMAT": "false"}'
    uses: ministryofjustice/analytical-platform-github-actions/.github/workflows/reusable-super-linter.yml@fe61ebce4093c531f1cbaa96a01c147b7bf33234 # v8.0.4
