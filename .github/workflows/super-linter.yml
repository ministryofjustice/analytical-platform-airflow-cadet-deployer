---
name: 🦝 Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      pull-requests: write
      statuses: write
    with:
      super-linter-variables: '{"VALIDATE_PYTHON_RUFF_FORMAT": "false"}'
    uses: ministryofjustice/analytical-platform-github-actions/.github/workflows/reusable-super-linter.yml@9539f487ca3cb11b6dd1a45c41c6b78d4fe8c7b3 # v8.0.0
